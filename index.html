<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D数据管理</title>

  <!-- <meta name="referrer" content="no-referrer" /> -->

  <link href="./libs/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <script src="./libs/Cesium/Cesium.js"></script>

  <script src="./libs/vue.global.js"></script>
  <link rel="stylesheet" href="./libs/element-plus.css" />
  <script src="./libs/element-plus.js"></script>
  <script src="./libs/element-plus-icons.js"></script>

  <style>
    html,
    body,
    #app,
    #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    .side-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 340px;
      max-height: calc(100% - 60px);
      background: rgba(6, 30, 51, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 163, 255, 0.3);
      border-radius: 4px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    .panel-header {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .model-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .model-item {
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 8px;
      padding: 12px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .model-item.active {
      border-left: 3px solid #00a3ff;
      background: rgba(0, 163, 255, 0.1);
    }

    .cesium-viewer-bottom {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="cesiumContainer"></div>

    <div class="side-panel">
      <div class="panel-header">
        <span style="font-weight: bold">数据源管理</span>
        <!-- <el-button type="primary" size="small" @click="fetchData"
            >刷新数据</el-button
          > -->
      </div>

      <div class="model-list">
        <div v-for="item in dataList" :key="item.dataId"
          :class="['model-item', currentId === item.dataId ? 'active' : '']" @click="selectModel(item)">
          <div style="flex: 1">
            <div style="font-size: 14px">{{ item.dataName }}</div>
            <!-- <div style="font-size: 11px; color: #888">{{ item.dataId }}</div> -->
          </div>
          <el-switch v-model="item.visible" size="small" @change="toggleVisible(item)" />
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const viewer = ref(null);
        const dataList = ref([]);
        const currentId = ref(null);
        const modelCache = new Map();

        // 配置信息 (使用 HTTPS 协议防止天地图拦截)
        const TDT_TK = "489e625dc42cbe2d78a5b0f7fbed1081";
        const CESIUM_TOKEN =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1ZTFkNThlNi1jNjVkLTRjNDctYTU2YS05NDIwMWU4ZjMwMGMiLCJpZCI6Mjk3MDU3LCJpYXQiOjE3NDU1NDU2OTB9.3dOscDlqKOuQxwLl3pVHoeB841kVWWdjTxQVX7m659c";

        const initCesium = async () => {
          Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

          let terrain;
          try {
            // 1.126.0 强制使用异步地形
            // 尝试加载在线地形，如果离线则回退到椭球体
            terrain = await Cesium.createWorldTerrainAsync();
          } catch (e) {
            console.warn("在线地形加载失败，切换为离线椭球体模式");
            terrain = new Cesium.EllipsoidTerrainProvider();
          }

          // 2. 初始化 Viewer (显式禁用默认影像，防止离线时加载 Bing Maps 报错)
          const _viewer = new Cesium.Viewer("cesiumContainer", {
            terrainProvider: terrain,
            animation: false,
            timeline: false,
            baseLayerPicker: false,
            geocoder: false,
            infoBox: false,
            selectionIndicator: false,
            navigationHelpButton: false,
            sceneModePicker: false,
            imageryProvider: false, // 关键：禁用默认在线底图
            contextOptions: {
              webgl: {
                alpha: true,
              },
            },
          });

          // 设置地球背景色（当无底图时显示的颜色，例如深蓝色海洋）
          _viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString("#0b1d36");

          try {
            // 3. 异步添加天地图影像底图
            // 优先尝试加载本地离线切片 (Z0-Z2)
            const offlineImgLayer = new Cesium.UrlTemplateImageryProvider({
              url: "./libs/map/img_w/{z}/{x}/{y}.png",
              minimumLevel: 0,
              maximumLevel: 18,
              tilingScheme: new Cesium.WebMercatorTilingScheme(), // 天地图w投影对应WebMercator
            });
            _viewer.imageryLayers.addImageryProvider(offlineImgLayer);

            // 尝试加载在线天地图（如果网络恢复，可以在高层级显示）
            const imgLayer = new Cesium.WebMapTileServiceImageryProvider({
              url: `https://t{s}.tianditu.gov.cn/img_w/wmts?tk=${TDT_TK}`,
              layer: "img",
              style: "default",
              format: "tiles",
              tileMatrixSetID: "w",
              subdomains: ["0", "1", "2", "3", "4", "5", "6", "7"], 
              maximumLevel: 18,
            });
            // 这里的错误处理是为了防止在线加载失败阻塞后续逻辑
            try {
              _viewer.imageryLayers.addImageryProvider(imgLayer);
            } catch (e) { console.warn("在线影像加载失败"); }

            // 4. 异步添加中文标注 (本地 + 在线)
            const offlineCiaLayer = new Cesium.UrlTemplateImageryProvider({
               url: "./libs/map/cia_w/{z}/{x}/{y}.png",
               minimumLevel: 0,
               maximumLevel: 18,
               tilingScheme: new Cesium.WebMercatorTilingScheme(),
            });
            _viewer.imageryLayers.addImageryProvider(offlineCiaLayer);

            const ciaLayer = new Cesium.WebMapTileServiceImageryProvider({
              url: `https://t{s}.tianditu.gov.cn/cia_w/wmts?tk=${TDT_TK}`,
              layer: "cia",
              style: "default",
              format: "tiles",
              tileMatrixSetID: "w",
              subdomains: ["0", "1", "2", "3", "4", "5", "6", "7"],
            });
            try {
              _viewer.imageryLayers.addImageryProvider(ciaLayer);
            } catch (e) { console.warn("在线标注加载失败"); }

          } catch (e) {
            console.warn("天地图加载异常，可能是网络原因", e);
          }

          viewer.value = _viewer;

          // 5. 初始视角定位到中国
          _viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(
              116.39,
              39.9,
              15000000.0,
            ),
          });
        };

        const loadModel = async (item) => {
          if (!item.unzipUrl) return;
          try {
            // 使用 Resource 处理跨域请求头（尝试绕过，但不一定成功，取决于后端限制）
            const resource = new Cesium.Resource({
              url: item.unzipUrl,
              // 如果后端需要特定的 Token，可以在这里加
              // headers: { 'Authorization': 'Bearer ...' }
            });

            // --- 核心性能优化参数 ---
            const setParams = {
              // 1. 显存缓存 (关键瓶颈)
              // 原值 128 太小。设置为 2048 (2GB) 或 4096 (4GB)，
              // 确保模型加载进内存后不会立即被清除，避免反复IO。
              maximumMemoryUsage: 2048,

              // 2. 屏幕空间误差 (平衡清晰度与性能)
              // 建议设为 16-24。配合下面的动态调节，不动时清晰，动时流畅。
              maximumScreenSpaceError: 16,

              // 3. 动态画质调节 (解决卡顿的神器)
              // 开启后，在拖拽/飞行时自动降低画质以保证帧率，静止时自动变清晰。
              dynamicScreenSpaceError: true,
              dynamicScreenSpaceErrorDensity: 0.0027, // 调整动态调节的敏感度
              dynamicScreenSpaceErrorFactor: 4.0, // 运动时画质降低的倍数
              dynamicScreenSpaceErrorHeightFalloff: 0.25,

              // 4. 跳跃式加载 (减少请求数)
              skipLevelOfDetail: true,
              baseScreenSpaceError: 1024,
              skipScreenSpaceErrorFactor: 16,
              skipLevels: 1,

              // 5. 加载策略
              immediatelyLoadDesiredLevelOfDetail: false, // 禁止立即加载最高模，防止瞬间卡死
              loadSiblings: false, // 关闭兄弟节点预加载，减少带宽压力（如果网络快可设为true）

              // 6. 剔除策略
              cullWithChildrenBounds: true,
              cullRequestsWhileMoving: true, // 移动相机时取消未完成的请求
              cullRequestsWhileMovingMultiplier: 60.0, // 加大移动时的剔除力度
            };

            const tileset = await Cesium.Cesium3DTileset.fromUrl(
              resource,
              setParams,
            );
            viewer.value.scene.primitives.add(tileset);
            modelCache.set(item.dataId, tileset);
            viewer.value.zoomTo(tileset);
            console.log("模型加载成功");
          } catch (e) {
            console.error("模型加载失败，请检查 CORS 限制或文件是否存在", e);
            ElementPlus.ElMessage.error(
              "模型文件跨域或不存在，请开启浏览器跨域插件",
            );
          }
        };

        const toggleVisible = (item) => {
          const tileset = modelCache.get(item.dataId);
          if (tileset) {
            tileset.show = item.visible;
            if (item.visible) viewer.value.zoomTo(tileset);
          } else if (item.visible) {
            // 关键点：确保 URL 以 tileset.json 结尾
            let url = item.unzipUrl;
            if (!url.endsWith("tileset.json")) {
              url = url.endsWith("/")
                ? url + "tileset.json"
                : url + "/tileset.json";
            }

            loadModel({ ...item, unzipUrl: url });
          }
        };

        const selectModel = (item) => {
          currentId.value = item.dataId;
          const tileset = modelCache.get(item.dataId);
          if (tileset) viewer.value.zoomTo(tileset);
        };

        const fetchData = () => {
          dataList.value = [
            {
              dataId: "1",
              dataName: "测试厂区模型1",
              type: 1,
              visible: false,
              // 示例文件使用网络地址，请替换为实际可访问的 URL，如：./WLH/tileset.json
              unzipUrl: "https://aio.hbbenxing.com//uavzc/file/03f70b49-3ee9-42d7-974c-fd12347bc667/unzip/",
            },
            {
              dataId: "2",
              dataName: "测试厂区模型2",
              type: 1,
              visible: false,
              unzipUrl: "./空间站/tileset.json", // 引入 tileset.json
            },
            {
              dataId: "3",
              dataName: "测试厂区模型3",
              type: 1,
              visible: false,
              unzipUrl: "./办公楼/tileset.json",
            },
          ];
        };

        onMounted(() => {
          initCesium();
          fetchData();
        });

        return { dataList, currentId, selectModel, toggleVisible, fetchData };
      },
    })
      .use(ElementPlus)
      .mount("#app");
  </script>
</body>

</html>
